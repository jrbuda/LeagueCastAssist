name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e .[dev,packaging]

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: python -m pytest

      - name: Build exe
        shell: pwsh
        run: .\build.ps1

      - name: Create checksum
        shell: pwsh
        run: Get-FileHash -Algorithm SHA256 -LiteralPath "dist\LeagueCastAssist.exe" | ForEach-Object { "$($_.Hash.ToLowerInvariant())  LeagueCastAssist.exe" } | Set-Content -LiteralPath "dist\LeagueCastAssist.exe.sha256" -Encoding ascii

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "dist\LeagueCastAssist.exe" "dist\LeagueCastAssist.exe.sha256" --generate-notes --title "${{ github.ref_name }}"
